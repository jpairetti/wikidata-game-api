[tool.pytest.ini_options]
addopts = ["-v", "--tb=short", "--cov=src", "--cov-report=term-missing", "--cov-fail-under=70"]
testpaths = ["tests"]
python_files = ["test_*.py"]
markers = [
    "integration: tests that require the running API or external services",
]

[tool.coverage.run]
source = ["src"]
omit = ["tests/*"]

[tool.coverage.report]
fail_under = 70
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]

[tool.ruff]
target-version = "py310"
line-length = 100
